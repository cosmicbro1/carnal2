<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carnal 2.0 Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #fff;
            max-width: 100%;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 16px;
            line-height: 1.4;
        }

        .user .bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .assistant .bubble {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 12px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 8px;
            background: #fafafa;
        }

        .input-field {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
        }

        .input-field:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .send-btn {
            background: #667eea;
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: background 0.2s;
        }

        .send-btn:active {
            background: #5568d3;
        }

        .loading {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 8px 0;
        }

        .loading span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .loading span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% { opacity: 0.3; }
            40% { opacity: 1; }
        }

        .menu-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin: 4px 2px;
        }

        .menu-btn:active {
            background: #5568d3;
        }

        .menu-section {
            display: none;
            padding: 8px;
            background: #f9f9f9;
            border-radius: 8px;
            margin: 8px 0;
        }

        .menu-section.open {
            display: block;
        }

        input[type="text"].small-input {
            width: 100%;
            padding: 8px;
            margin: 4px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 8px 12px;
            border-radius: 6px;
            margin: 4px 0;
            font-size: 14px;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 8px 12px;
            border-radius: 6px;
            margin: 4px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔮 Carnal 2.0</h1>
            <p>Your mystical AI companion</p>
        </div>

        <div class="chat-window" id="chatWindow"></div>

        <div class="input-area">
            <input 
                type="text" 
                class="input-field" 
                id="messageInput" 
                placeholder="Talk to Carnal..."
                autocomplete="off"
            >
            <button class="send-btn" id="voiceBtn" title="Talk to me">🎤</button>
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById("chatWindow");
        const messageInput = document.getElementById("messageInput");
        const sendBtn = document.getElementById("sendBtn");
        const voiceBtn = document.getElementById("voiceBtn");

        // Speech Recognition setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                isListening = true;
                voiceBtn.style.background = '#ff6b6b';
                voiceBtn.textContent = '🎙️';
            };

            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                messageInput.value = transcript.trim();
            };

            recognition.onend = () => {
                isListening = false;
                voiceBtn.style.background = '#667eea';
                voiceBtn.textContent = '🎤';
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                voiceBtn.style.background = '#667eea';
                voiceBtn.textContent = '🎤';
                if (event.error !== 'no-speech') {
                    addMessage(`Voice error: ${event.error}`);
                }
            };

            voiceBtn.addEventListener('click', () => {
                if (isListening) {
                    recognition.stop();
                } else {
                    messageInput.value = '';
                    recognition.start();
                }
            });
        } else {
            voiceBtn.style.opacity = '0.5';
            voiceBtn.style.cursor = 'not-allowed';
            voiceBtn.title = 'Voice not supported on this browser';
        }

        // Focus input on load
        messageInput.focus();

        function addMessage(text, isUser = false) {
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${isUser ? "user" : "assistant"}`;
            
            const bubble = document.createElement("div");
            bubble.className = "bubble";
            bubble.textContent = text;
            
            msgDiv.appendChild(bubble);
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function showLoading() {
            const msgDiv = document.createElement("div");
            msgDiv.className = "message assistant";
            msgDiv.id = "loadingMsg";
            
            const bubble = document.createElement("div");
            bubble.className = "bubble";
            bubble.innerHTML = '<div class="loading"><span></span><span></span><span></span></div>';
            
            msgDiv.appendChild(bubble);
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function removeLoading() {
            const loading = document.getElementById("loadingMsg");
            if (loading) loading.remove();
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            addMessage(message, true);
            messageInput.value = "";
            showLoading();

            try {
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message })
                });

                removeLoading();

                if (!response.ok) {
                    const data = await response.json();
                    addMessage(`Error: ${data.error}`);
                    return;
                }

                const data = await response.json();
                addMessage(data.reply);
            } catch (error) {
                removeLoading();
                addMessage(`Connection error: ${error.message}`);
            }

            messageInput.focus();
        }

        // Send on Enter
        messageInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });

        sendBtn.addEventListener("click", sendMessage);

        // Auto-send after listening
        messageInput.addEventListener("change", () => {
            if (messageInput.value.trim() && !isListening) {
                setTimeout(sendMessage, 300);
            }
        });

        // Initial greeting
        window.addEventListener("load", () => {
            addMessage("Hey! I'm Carnal 2.0. What's on your mind?");
        });
    </script>
</body>
</html>
